version: "2"

linters:
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - gosec
    - misspell
    - revive
    - unconvert
    - unparam

formatters:
  enable:
    - gofmt
    - goimports

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
        - unparam

run:
  timeout: 5m
  modules-download-mode: readonly
