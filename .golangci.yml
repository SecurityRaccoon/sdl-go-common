version: "2"

linters:
  default: none
  enable:
    - bodyclose
    - errorlint
    - govet
    - misspell
    - unconvert
    - whitespace

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: '_test\.go'
      linters:
        - errcheck
        - errorlint
    - linters:
        - errorlint
      text: 'context\.Canceled|context\.DeadlineExceeded'

run:
  timeout: 5m
  modules-download-mode: readonly
